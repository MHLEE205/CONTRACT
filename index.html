<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEENAI 契約入力アシスタント v1.3</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b27; --surface2: #1e2438;
  --border: #2a3050; --accent: #4f8ef7; --accent2: #6ee7b7;
  --warn: #f59e0b; --danger: #ef4444; --ok: #22c55e;
  --text: #e2e8f0; --text2: #8892b0; --text3: #3d4a70;
  --radius: 12px; --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Meiryo', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 54px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { width: 30px; height: 30px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: #fff; }
.header-title { font-size: 14px; font-weight: 700; }
.header-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.header-status { display: flex; gap: 8px; align-items: center; }
.conn-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.conn-badge.offline { background: var(--surface2); color: var(--text3); }
.conn-badge.connecting { background: rgba(245,158,11,0.15); color: var(--warn); }
.conn-badge.online { background: rgba(34,197,94,0.15); color: var(--ok); }
.user-chip { font-size: 11px; color: var(--accent); background: rgba(79,142,247,0.12); padding: 3px 10px; border-radius: 20px; font-weight: 600; }

/* Login Card */
.login-card { max-width: 480px; margin: 60px auto; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; text-align: center; }
.login-icon { font-size: 40px; margin-bottom: 12px; }
.login-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
.login-btn { background: var(--accent); color: #fff; border: none; padding: 14px 32px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.login-skip { display: block; margin-top: 16px; color: var(--text2); font-size: 12px; cursor: pointer; background: none; border: none; font-family: inherit; }
.login-skip:hover { color: var(--text); }

/* Loading Overlay */
.loading-overlay { position: fixed; inset: 0; background: rgba(13,17,23,0.85); z-index: 1000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
.loading-overlay.show { display: flex; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text2); }

/* Tabs */
.tabs { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; padding: 0 24px; gap: 2px; overflow-x: auto; }
.tab { padding: 11px 16px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; background: none; border-left: none; border-right: none; border-top: none; font-family: inherit; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.main { max-width: 720px; margin: 0 auto; padding: 28px 20px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Progress Bar */
.progress-bar { display: flex; align-items: center; margin-bottom: 28px; gap: 0; overflow-x: auto; padding-bottom: 4px; }
.prog-item { display: flex; flex-direction: column; align-items: center; min-width: 48px; }
.prog-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--text3); transition: all 0.3s; }
.prog-dot.done { background: var(--ok); border-color: var(--ok); color: #fff; font-size: 12px; }
.prog-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 0 0 4px rgba(79,142,247,0.2); }
.prog-label { font-size: 9px; color: var(--text3); margin-top: 3px; text-align: center; max-width: 46px; line-height: 1.2; }
.prog-line { flex: 1; height: 2px; background: var(--border); min-width: 10px; max-width: 32px; margin-bottom: 14px; transition: background 0.3s; }
.prog-line.done { background: var(--ok); }

.wizard-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; animation: fadeIn 0.22s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.step-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.step-question { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
.step-hint { font-size: 13px; color: var(--text2); margin-bottom: 20px; }

.suggest-btn { width: 100%; background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(110,231,183,0.06)); border: 1.5px solid var(--accent); border-radius: var(--radius); padding: 14px 18px; cursor: pointer; text-align: left; transition: all 0.2s; margin-bottom: 10px; position: relative; overflow: hidden; font-family: inherit; color: var(--text); }
.suggest-btn:hover { background: linear-gradient(135deg, rgba(79,142,247,0.22), rgba(110,231,183,0.12)); transform: translateY(-1px); }
.suggest-btn-main { font-size: 16px; font-weight: 700; }
.suggest-btn-sub { font-size: 12px; color: var(--accent2); margin-top: 3px; }
.suggest-pct { position: absolute; top: 12px; right: 14px; background: rgba(110,231,183,0.15); color: var(--accent2); font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

.option-grid { display: grid; gap: 8px; margin-bottom: 12px; }
.option-grid.col2 { grid-template-columns: 1fr 1fr; }
.option-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
.option-grid.col4 { grid-template-columns: repeat(4,1fr); }
.opt-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text2); transition: all 0.2s; text-align: center; font-family: inherit; }
.opt-btn:hover { border-color: var(--accent); color: var(--text); }
.opt-btn.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); color: var(--accent); }

.num-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 15px; font-weight: 600; color: var(--text); width: 130px; text-align: right; transition: border 0.2s; font-family: inherit; }
.num-input:focus { outline: none; border-color: var(--accent); }
.num-unit { font-size: 13px; color: var(--text2); font-weight: 600; }
.num-input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.quick-nums { display: flex; gap: 6px; flex-wrap: wrap; }
.quick-num { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 11px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.quick-num:hover { border-color: var(--accent); color: var(--accent); }
.text-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 14px; color: var(--text); transition: border 0.2s; margin-bottom: 8px; font-family: inherit; }
.text-input:focus { outline: none; border-color: var(--accent); }
textarea.text-input { resize: vertical; min-height: 70px; }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px 10px 36px; font-size: 14px; color: var(--text); transition: border 0.2s; font-family: inherit; }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
.dropdown { position: absolute; top: calc(100% + 2px); left: 0; right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); z-index: 50; max-height: 260px; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.4); display: none; }
.dropdown.open { display: block; }
.dropdown-item { padding: 9px 14px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: var(--surface2); }
.dropdown-item-main { font-size: 13px; font-weight: 600; }
.dropdown-item-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.dropdown-new { padding: 10px 14px; cursor: pointer; color: var(--accent); font-size: 13px; font-weight: 700; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.dropdown-new:hover { background: rgba(79,142,247,0.08); }

.pa-badge { display: inline-block; background: rgba(79,142,247,0.15); color: var(--accent); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
.code-badge { display: inline-block; background: rgba(110,231,183,0.15); color: var(--accent2); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 4px; }
.ryakugo-badge { display: inline-block; background: rgba(245,158,11,0.15); color: var(--warn); font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; }

.recent-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; }
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }

.warn-box { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--warn); margin-bottom: 10px; }
.info-box { background: rgba(79,142,247,0.08); border: 1px solid rgba(79,142,247,0.2); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--accent2); margin-bottom: 10px; }
.err-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: var(--radius-sm); padding: 10px 14px; font-size: 12px; color: var(--danger); margin-bottom: 10px; }

.nav-row { display: flex; gap: 10px; margin-top: 20px; }
.btn-back { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn-back:hover { border-color: var(--text2); color: var(--text); }
.btn-next { flex: 1; background: var(--accent); border: none; border-radius: var(--radius-sm); padding: 12px 20px; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.btn-next:hover { opacity: 0.88; }
.btn-next:disabled { opacity: 0.3; cursor: not-allowed; }

.detail-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.detail-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; position: relative; }
.detail-card-head { display: flex; justify-content: space-between; align-items: flex-start; }
.detail-card-title { font-size: 14px; font-weight: 700; }
.detail-card-amount { font-size: 14px; font-weight: 700; color: var(--accent2); }
.detail-card-body { font-size: 12px; color: var(--text2); margin-top: 4px; }
.detail-card-remark { font-size: 12px; color: var(--warn); margin-top: 4px; }
.btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 0 4px; transition: color 0.2s; }
.btn-del:hover { color: var(--danger); }

.preview-table { width: 100%; border-collapse: collapse; margin: 14px 0; }
.preview-table th, .preview-table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
.preview-table th { color: var(--text2); font-weight: 600; width: 34%; }
.preview-table td { color: var(--text); font-weight: 600; }
.preview-section-row td, .preview-section-row th { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; padding-top: 14px; }

.complete-actions { display: grid; gap: 10px; margin-top: 18px; }
.action-btn { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; font-family: inherit; color: var(--text); }
.action-btn:hover { border-color: var(--accent); }
.action-btn.primary { border-color: var(--accent); background: rgba(79,142,247,0.08); }
.action-icon { font-size: 20px; width: 32px; text-align: center; }
.action-text-main { font-size: 14px; font-weight: 700; }
.action-text-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

.new-form { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
.new-form-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 14px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.form-row.full { grid-template-columns: 1fr; }
.form-label { font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
.form-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; color: var(--text); transition: border 0.2s; font-family: inherit; }
.form-input:focus { outline: none; border-color: var(--accent); }

.mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.mode-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.mode-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.mode-card.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
.mode-icon { font-size: 28px; margin-bottom: 8px; }
.mode-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }

.type-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.type-card { background: var(--surface2); border: 2px solid var(--border); border-radius: var(--radius); padding: 22px 16px; cursor: pointer; transition: all 0.2s; text-align: center; }
.type-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.type-card.selected { border-color: var(--accent); background: rgba(79,142,247,0.08); }
.type-icon { font-size: 30px; margin-bottom: 8px; }
.type-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.type-desc { font-size: 11px; color: var(--text2); }

.history-list { display: flex; flex-direction: column; gap: 10px; }
.history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.history-no { font-size: 13px; font-weight: 700; color: var(--accent); }
.history-packer { font-size: 14px; font-weight: 700; margin-top: 2px; }
.history-detail { font-size: 12px; color: var(--text2); margin-top: 3px; }
.history-status { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
.status-pending { background: rgba(245,158,11,0.15); color: var(--warn); }
.status-done { background: rgba(34,197,94,0.15); color: var(--ok); }

.section-title { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 14px; letter-spacing: 0.5px; }
.powered { text-align: center; font-size: 11px; color: var(--text3); margin-top: 40px; padding: 20px; }

.selected-box { background: rgba(110,231,183,0.07); border: 1px solid rgba(110,231,183,0.25); border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 12px; }
.selected-box-label { font-size: 11px; color: var(--accent2); font-weight: 700; margin-bottom: 3px; }
.selected-box-name { font-size: 15px; font-weight: 700; }
.selected-box-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

.divider { height: 1px; background: var(--border); margin: 16px 0; }

.history-mini { background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 11px; }
.history-mini-label { color: var(--text3); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.history-mini-row { color: var(--text2); padding: 2px 0; }
.history-mini-row strong { color: var(--text); }

.master-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 15px; margin-bottom: 8px; }

/* Scrollable list for 93 packers */
.packer-list { max-height: 600px; overflow-y: auto; padding-right: 4px; }
.packer-list::-webkit-scrollbar { width: 6px; }
.packer-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">処理中...</div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo">LN</div>
    <div>
      <div class="header-title">LEENAI 契約入力アシスタント</div>
      <div class="header-sub">v1.3 (2026-04-18) &nbsp;|&nbsp; SYS-A-01 &nbsp;|&nbsp; Dataverse連携</div>
    </div>
  </div>
  <div class="header-status">
    <span class="user-chip" id="userChip" style="display:none;"></span>
    <span class="conn-badge offline" id="connBadge">● オフライン</span>
  </div>
</div>

<!-- Login Card (初期画面) -->
<div class="login-card" id="loginCard">
  <div class="login-icon">🔐</div>
  <div class="login-title">COMPASS Dataverse に接続</div>
  <div class="login-sub">
    ログインすると 93社の購買元マスター、過去3,961件の契約履歴、<br>
    品目別単価統計が自動ロードされます。
  </div>
  <button class="login-btn" onclick="startLogin()">🚀 ログイン</button>
  <button class="login-skip" onclick="useOfflineMode()">データなしで起動 (DEMO)</button>
</div>

<!-- Tabs -->
<div class="tabs" id="tabsBar" style="display:none;">
  <button class="tab active" onclick="showTab('wizard')">📝 契約入力</button>
  <button class="tab" onclick="showTab('history')">📋 履歴</button>
  <button class="tab" onclick="showTab('master')">🗂 マスター</button>
</div>

<!-- 契約入力 -->
<div id="tab-wizard" class="tab-content active" style="display:none;">
<div class="main">
  <div class="progress-bar" id="progressBar"></div>
  <div id="wizardContainer"></div>
</div>
</div>

<!-- 履歴 -->

</div>
</div>

<div class="main">

  <div class="search-wrap" style="margin-bottom:14px;">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="masterSearch" placeholder="会社名・PA ID・コード・略号で検索..." oninput="filterMasterList()">
  </div>
  <div class="packer-list" id="masterList"></div>
  <div class="powered">✦ Powered by LEENAI Automation System</div>
</div>
</div>

<script>

// ══════════════════════════════════════════════════════
// 設定・定数
// ══════════════════════════════════════════════════════
const CLIENT_ID    = 'f071a165-5e9b-44bf-b6a1-baba654524db';
const TENANT_ID    = 'a56988ff-c2b8-4df8-9727-889ad4205198';
const DV_URL       = 'https://orgde512c6f.crm7.dynamics.com';
const DV_API       = `${DV_URL}/api/data/v9.2`;
const REDIRECT_URI = location.origin + location.pathname;
const SCOPE        = `${DV_URL}/user_impersonation openid profile`;

const POLS = ['東京','横浜','大阪','神戸','名古屋','博多','仙台','那覇','金沢','石狩','新潟'];
const AVG_KG_PER_CONTAINER = 23000;
const DEMO_EXCHANGE = 156.83;  // 2026-04-13 みずほTTB

// 과거 계약번호 → 약자 추출 (클라이언트 사이드 분석)
function extractRyakugoMap(contracts) {
  const counter = {};
  contracts.forEach(c => {
    const cn = c.cr49f_purchase_contract_no;
    const pid = c['_cr49f_packer_id_value'];
    if (!cn || !pid || !cn.startsWith('LR-') || cn.length < 10) return;
    const r = cn.substring(7, 9).toUpperCase();
    if (!/^[A-Z]{2}$/.test(r)) return;
    if (!counter[r]) counter[r] = {};
    counter[r][pid] = (counter[r][pid] || 0) + 1;
  });
  const idToRyakugo = {};
  Object.keys(counter).forEach(r => {
    const entries = Object.entries(counter[r]).sort((a,b) => b[1] - a[1]);
    const [topId, topCount] = entries[0];
    const total = entries.reduce((s,[,c]) => s+c, 0);
    if (topCount / total >= 0.95 && !idToRyakugo[topId]) {
      idToRyakugo[topId] = r;
    }
  });
  return idToRyakugo;
}

// OAuth (PKCE) — PO_TOOL v2.1 패턴
// ══════════════════════════════════════════════════════
function b64url(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
async function sha256(str) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)); }
function randomStr(len=64) { const a=new Uint8Array(len); crypto.getRandomValues(a); return b64url(a).slice(0,len); }

async function startLogin() {
  setConn('connecting', '● 接続中...');
  const verifier = randomStr(64);
  const challenge = b64url(await sha256(verifier));
  const state = 'dv_' + randomStr(16);
  sessionStorage.setItem('pkce_verifier', verifier);
  sessionStorage.setItem('pkce_state', state);
  const params = new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code', redirect_uri: REDIRECT_URI,
    scope: SCOPE, state, code_challenge: challenge, code_challenge_method: 'S256',
    prompt: 'select_account'
  });
  location.href = `https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/authorize?${params}`;
}

async function handleCallback() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  if (!code) return false;
  history.replaceState({}, '', location.pathname);

  showLoading('Dataverse認証中...');
  try {
    const verifier = sessionStorage.getItem('pkce_verifier');
    const res = await fetch(`https://login.microsoftonline.com/${TENANT_ID}/oauth2/v2.0/token`, {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: new URLSearchParams({
        client_id: CLIENT_ID, grant_type: 'authorization_code',
        code, redirect_uri: REDIRECT_URI, code_verifier: verifier, scope: SCOPE
      })
    });
    const data = await res.json();
    if (!data.access_token) throw new Error(data.error_description || 'トークン取得失敗');
    S.accessToken = data.access_token;
    S.tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;

    // 사용자 정보
    try {
      const me = await fetch('https://graph.microsoft.com/v1.0/me', {
        headers: {Authorization: `Bearer ${S.accessToken}`}
      }).then(r => r.json());
      S.userName = me.displayName || '';
      S.userEmail = me.mail || me.userPrincipalName || '';
      document.getElementById('userChip').textContent = S.userName;
      document.getElementById('userChip').style.display = 'inline-block';
    } catch(e) {}

    setConn('online', '● Dataverse接続');
    DATAVERSE_MODE = true;
    await loadAllData();
    showMainUI();
  } catch(e) {
    hideLoading();
    setConn('offline', '● オフライン');
    alert('認証エラー: ' + e.message);
  }
  return true;
}

async function dvGet(path) {
  if (Date.now() > S.tokenExpiry) throw new Error('セッション切れ。再ログインしてください。');
  const res = await fetch(`${DV_API}/${path}`, {
    headers: {
      'Authorization': `Bearer ${S.accessToken}`,
      'OData-MaxVersion': '4.0', 'OData-Version': '4.0',
      'Accept': 'application/json',
      'Prefer': 'odata.include-annotations="OData.Community.Display.V1.FormattedValue"'
    }
  });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(`API ${res.status}: ${e?.error?.message || res.statusText}`);
  }
  return res.json();
}

async function loadAllData() {
  try {
    showLoading('Packerマスター読み込み中... (93社)');

      '&$orderby=cr49f_id asc');
    PACKERS = (packersRes.value || []).map(p => ({
      id: p.cr49f_packerid,  // GUID
      cr49f_id: p.cr49f_id,
      packer: p.cr49f_packer || '',
      code: p.cr49f_packer_code || '',
      name: p.cr49f_packer_name || '',
      address: p.cr49f_packer_address || '',
      person: p.cr49f_packer_person || '',
      tel: p.cr49f_packer_tel || '',
      fax: p.cr49f_parker_fax || '',
      payment: p.cr49f_payment_term || '',
      ryakugo: '', // 나중에 채움
    }));

    showLoading('過去契約読み込み中... (最近500件)');
    // 2. Recent contracts
    const contractsRes = await dvGet('cr49f_purchase_contracts?$top=500' +
      '&$orderby=cr49f_contract_date desc' +
      '&$select=cr49f_purchase_contractid,cr49f_purchase_contract_no,cr49f_contract_date,' +
      '_cr49f_packer_id_value,cr49f_exchange_rate,cr49f_latest_vanning,cr49f_payment_term');
    RECENT_CONTRACTS = contractsRes.value || [];

    // 3. 약자 매핑 (클라이언트 사이드)
    // 문제: _cr49f_packer_id_value는 GUID인데 COMPASS_MAPPING 에선 숫자 id를 썼음
    // 실제로는 cr49f_packer의 cr49f_id (숫자) 필드를 매핑해야 함
    // GUID → cr49f_id 매핑
    const guidToNumId = {};
    PACKERS.forEach(p => { guidToNumId[p.id.toLowerCase()] = p.cr49f_id; });

    // Contract에서 GUID → 약자 추출
    const ryakuCounter = {};
    RECENT_CONTRACTS.forEach(c => {
      const cn = c.cr49f_purchase_contract_no;
      const guid = (c['_cr49f_packer_id_value'] || '').toLowerCase();
      if (!cn || !guid || !cn.startsWith('LR-') || cn.length < 10) return;
      const r = cn.substring(7, 9).toUpperCase();
      if (!/^[A-Z]{2}$/.test(r)) return;
      if (!ryakuCounter[r]) ryakuCounter[r] = {};
      ryakuCounter[r][guid] = (ryakuCounter[r][guid] || 0) + 1;
    });
    const guidToRyakugo = {};
    Object.keys(ryakuCounter).forEach(r => {
      const entries = Object.entries(ryakuCounter[r]).sort((a,b) => b[1] - a[1]);
      const [topGuid, topCount] = entries[0];
      const total = entries.reduce((s,[,c]) => s+c, 0);
      if (topCount / total >= 0.95 && !guidToRyakugo[topGuid]) {
        guidToRyakugo[topGuid] = r;
      }
    });
    PACKERS.forEach(p => { p.ryakugo = guidToRyakugo[p.id.toLowerCase()] || ''; });

    showLoading('品目明細読み込み中... (関連品目)');
    // 4. 最近 contracts の details (품목별 단가)
    const contractIds = RECENT_CONTRACTS.slice(0, 100).map(c => c.cr49f_purchase_contractid);
    if (contractIds.length) {
      // 배치로 분할 (100개는 한번에 가능)
      const filter = contractIds.map(id => `_cr49f_purchase_contract_id_value eq ${id}`).join(' or ');
      try {
        const detailsRes = await dvGet('cr49f_purchase_details?$filter=' + encodeURIComponent(filter) +
          '&$select=cr49f_count,cr49f_incoterms,cr49f_loading_port,cr49f_price,cr49f_quantity,' +
          '_cr49f_purchase_contract_id_value,_cr49f_item_id_value' +
          '&$expand=cr49f_item_id($select=cr49f_item,crcf9_item_japan)');
        (detailsRes.value || []).forEach(d => {
          const cid = d['_cr49f_purchase_contract_id_value'];
          if (!CONTRACT_ITEMS[cid]) CONTRACT_ITEMS[cid] = [];
          CONTRACT_ITEMS[cid].push({
            count: d.cr49f_count, inco: d.cr49f_incoterms, pol: d.cr49f_loading_port,
            price: d.cr49f_price, qty: d.cr49f_quantity,
            item_code: d.cr49f_item_id?.cr49f_item || '',
            item_name_jp: d.cr49f_item_id?.crcf9_item_japan || '',
          });
        });
      } catch(e) { console.warn('詳細取得失敗:', e.message); }
    }

    hideLoading();
    renderHistory();
    renderMaster();
  } catch(e) {
    hideLoading();
    alert('データ読み込みエラー: ' + e.message);
    throw e;
  }
}

// Stats 계산 (Packer × Item 과거 패턴)
// ══════════════════════════════════════════════════════
function getPackerStats(packerId) {
  const myContracts = RECENT_CONTRACTS.filter(c =>
    (c['_cr49f_packer_id_value'] || '').toLowerCase() === packerId.toLowerCase()
  );
  const myItems = [];
  myContracts.forEach(c => {
    const dets = CONTRACT_ITEMS[c.cr49f_purchase_contractid] || [];
    dets.forEach(d => {
      myItems.push({...d, date: c.cr49f_contract_date, cn: c.cr49f_purchase_contract_no});
    });
  });
  // 集計
  const polCounter = {};
  const incoCounter = {};
  const itemMap = {}; // item_code → history[]
  myItems.forEach(d => {
    if (d.pol) polCounter[d.pol] = (polCounter[d.pol] || 0) + 1;
    if (d.inco) incoCounter[d.inco] = (incoCounter[d.inco] || 0) + 1;
    if (d.item_code) {
      if (!itemMap[d.item_code]) itemMap[d.item_code] = [];
      itemMap[d.item_code].push(d);
    }
  });
  const topPol = Object.entries(polCounter).sort((a,b) => b[1]-a[1])[0];
  const topInco = Object.entries(incoCounter).sort((a,b) => b[1]-a[1])[0];
  return {
    contracts_count: myContracts.length,
    details_count: myItems.length,
    top_pol: topPol?.[0] || '',
    top_pol_pct: topPol ? Math.round(topPol[1] / myItems.length * 100) : 0,
    top_inco: topInco?.[0] || '港',
    items: itemMap,
    recent_contracts: myContracts.slice(0, 5),
  };
}

function getItemStats(packerId, itemCode) {
  const stats = getPackerStats(packerId);
  const history = stats.items[itemCode] || [];
  if (!history.length) return null;
  history.sort((a,b) => String(b.date).localeCompare(String(a.date)));
  return {
    last_price: history[0].price,
    last_pol: history[0].pol,
    last_inco: history[0].inco,
    last_count: history[0].count,
    last_date: history[0].date,
    price_history: history.slice(0, 3).map(h => h.price),
    total: history.length,
  };
}

  let html = '';
  labels.forEach((label, i) => {
    if (i > 0) html += `<div class="prog-line ${i<=S.step?'done':''}"></div>`;

async function loadRevise() {
  try {
    showLoading('既存契約を読み込み中...');
    // 1. Find contract
    const cr = await dvGet(`cr49f_purchase_contracts?$filter=cr49f_purchase_contract_no eq '${S.reviseNo}'&$top=1`);
    if (!cr.value?.length) {
      hideLoading();
      alert(`「${S.reviseNo}」が見つかりません`);
      return;
    }
    const contract = cr.value[0];
    const packerId = contract['_cr49f_packer_id_value'];
    const packer = PACKERS.find(p => p.id.toLowerCase() === packerId.toLowerCase());
    if (!packer) { hideLoading(); alert(`Packer不明: ${packerId}`); return; }
    
    S.packer = packer;
    S.paymentTerm = contract.cr49f_payment_term || packer.payment;
    S.exchangeRate = contract.cr49f_exchange_rate || DEMO_EXCHANGE;
    S.deadline = (contract.cr49f_latest_vanning || '').split('T')[0] || endOfMonth();
    
    // 2. Details
    const detRes = await dvGet(`cr49f_purchase_details?$filter=_cr49f_purchase_contract_id_value eq ${contract.cr49f_purchase_contractid}&$expand=cr49f_item_id($select=cr49f_item,crcf9_item_japan)`);
    S.details = (detRes.value || []).map(d => {
      const itemCode = d.cr49f_item_id?.cr49f_item || '';
      const itemName = d.cr49f_item_id?.crcf9_item_japan || '';
      const qty = (d.cr49f_quantity || 0) * 1000;
      const price = d.cr49f_price || 0;
      return {
        item: { code: itemCode, nameJp: itemName },
        qty, count: d.cr49f_count || 0, price,
        pol: d.cr49f_loading_port || '', incoterms: d.cr49f_incoterms || '港',
        remark: '', amount: Math.floor(qty * price)
      };
    });
    S.contractNo = S.reviseNo;
    S.reviseDate = today();
    hideLoading();
    alert(`✅ 「${S.reviseNo}」${S.details.length}件の品目を読み込みました。\n変更箇所を修正してください。`);
    S.step = 3;
    renderStep();
  } catch(e) {
    hideLoading();
    alert('読み込みエラー: ' + e.message);
  }
}

function renderPackerSelected() {
  const p = S.packer;
  const stats = getPackerStats(p.id);

function packerDropItem(p) {
  return `<div class="dropdown-item" onclick="selectPacker('${p.id}')">
    <div class="dropdown-item-main">
      <span class="pa-badge">PA${p.cr49f_id}</span>
      <span class="code-badge">${p.code||'—'}</span>
      ${p.ryakugo ? `<span class="ryakugo-badge">${p.ryakugo}</span>` : ''}
      ${p.name}
    </div>
    <div class="dropdown-item-sub">${p.address||''} / ${p.person||''}</div>
  </div>`;
}

function filterPackers(showAll) {
  const q = (document.getElementById('packerSearch')?.value||'').toLowerCase();
  const dd = document.getElementById('packerDropdown');
  if (!dd) return;
  if (!q && !showAll) { dd.classList.remove('open'); return; }
  const filtered = PACKERS.filter(p => {
    if (!q) return true;
    return (p.name||'').toLowerCase().includes(q) ||
           ('pa'+p.cr49f_id).toLowerCase().includes(q) ||
           (p.code||'').toLowerCase().includes(q) ||
           (p.ryakugo||'').toLowerCase().includes(q) ||
           (p.packer||'').toLowerCase().includes(q);
  }).slice(0, 50);
  dd.innerHTML = filtered.map(packerDropItem).join('') +
    `<div class="dropdown-new" onclick="showNewPacker()">＋ 新規業者を追加</div>`;
  dd.classList.add('open');
}

function closeDropdown() { document.getElementById('packerDropdown')?.classList.remove('open'); }
function showNewPacker() { closeDropdown(); document.getElementById('newPackerForm').style.display='block'; }
function hideNewPacker() { document.getElementById('newPackerForm').style.display='none'; }

function saveNewPacker() {
  const name = document.getElementById('np_name').value.trim();
  const code = document.getElementById('np_code').value.trim().toUpperCase();
  if (!name || !code) { alert('会社名と正式コードは必須です。'); return; }
  const newP = {
    id: 'LOCAL_' + Date.now(),
    cr49f_id: 'L' + (PACKERS.filter(p=>p.isLocal).length+1),
    packer: code, code,
    ryakugo: document.getElementById('np_ryakugo').value.trim().toUpperCase(),
    name,
    address: document.getElementById('np_address').value.trim(),
    tel: document.getElementById('np_tel').value.trim(),
    fax: document.getElementById('np_fax').value.trim(),
    person: document.getElementById('np_person').value.trim(),
    payment: document.getElementById('np_payment').value,
    isLocal: true,
  };
  PACKERS.push(newP);
  selectPacker(newP.id);
  alert(`✅「${name}」をローカル登録しました。\n後でCOMPASSに手動登録してください。`);
  renderMaster();
}

function selectPacker(id) {
  S.packer = PACKERS.find(p => p.id === id);
  closeDropdown();
  renderStep();
}

function renderStep8_Item() {

function renderStep10_Price() {
  const stats = S.packer ? getItemStats(S.packer.id, S.currentDetail.item?.code) : null;

  const hist = stats?.price_history || [];
  if (!S.currentDetail.price && sug) S.currentDetail.price = sug;
  const isWarn = S.currentDetail.price && sug && Math.abs(S.currentDetail.price-sug)/sug > 0.2;
  return `<div class="wizard-card">
    <div class="step-label">STEP ${stepNo(10)} · 単価</div>
    <div class="step-question">${S.currentDetail.item?.code || ''} の単価は？</div>
    ${sug ? `
    <div class="suggest-btn" onclick="S.currentDetail.price=${sug};renderStep()">
      <div class="suggest-btn-main">💴 ¥${sug} / KG</div>
      <div class="suggest-btn-sub">${S.currentDetail.item?.code}の直近単価 ${hist.length ? '· 推移: ' + hist.map(p => `¥${p}`).join(' → ') : ''}</div>
    </div>` : ''}
    <div class="num-input-row"><input type="number" class="num-input" value="${S.currentDetail.price||''}" step="0.1" oninput="S.currentDetail.price=parseFloat(this.value)||0;calcAmt()"><span class="num-unit">¥ / KG</span></div>

    ${S.currentDetail.price && S.currentDetail.qty ? `<div style="background:var(--surface2);border-radius:8px;padding:10px 14px;"><div style="font-size:12px;color:var(--text2);">金額 (税抜)</div><div style="font-size:18px;font-weight:700;color:var(--accent2);" id="amtPrev">¥${Math.floor(S.currentDetail.qty*S.currentDetail.price).toLocaleString()}</div></div>` : ''}

function calcAmt() {
  const el = document.getElementById('amtPrev');

function renderStep13_ContractNo() {
  if (!S.contractNo || S.mode === 'new') S.contractNo = suggestNo();
  return `<div class="wizard-card">
    <div class="step-label">STEP ${stepNo(13)} · 契約番号</div>
    <div class="step-question">契約番号を確認してください</div>
    <div class="suggest-btn">
      <div class="suggest-btn-main">📋 ${S.contractNo}</div>
      <div class="suggest-btn-sub">${S.mode==='revise'?'変更元番号を引き継ぎ':'Dataverse 既存件数 + 1 で自動採番'}</div>
    </div>
    <div style="font-size:12px;color:var(--text2);margin:8px 0 6px;">または手動入力:</div>
    <input class="text-input" value="${S.contractNo}" style="width:210px;font-weight:700;font-size:16px;letter-spacing:1px;" oninput="S.contractNo=this.value.toUpperCase()">
    <div class="nav-row"><button class="btn-back" onclick="prevStep()">← 戻る</button><button class="btn-next" onclick="nextStep()">最終確認へ →</button></div>
  </div>`;
}

function suggestNo() {
  const ryakugo = S.packer?.ryakugo || 'XX';
  const d = new Date();
  const yy = String(d.getFullYear()).slice(2);
  const mm = pad(d.getMonth()+1);
  const prefix = `LR-${yy}${mm}${ryakugo}`;
  const existing = RECENT_CONTRACTS.filter(c => (c.cr49f_purchase_contract_no||'').startsWith(prefix));
  const nums = existing.map(c => parseInt((c.cr49f_purchase_contract_no||'').slice(prefix.length)) || 0);
  const nextN = (nums.length ? Math.max(...nums) : 0) + 1;
  return `${prefix}${nextN}`;
}

// STEP 14: 最終確認

  const subtotal = S.details.reduce((s,d) => s+d.amount, 0);
  const tax = Math.floor(subtotal*0.10);

  return `<div class="wizard-card">

    ${S.mode==='revise' ? `<div class="info-box">🔄 変更再発行 (Revise) · 変更元: ${S.reviseNo}</div>` : ''}
    <table class="preview-table">
      <tr class="preview-section-row"><td colspan="2">基本情報</td></tr>
      <tr><th>契約番号</th><td>${S.contractNo}${S.mode==='revise'?` <span style="color:var(--accent);font-size:11px;">(Revise: ${S.reviseDate})</span>`:''}</td></tr>
      <tr><th>契約日</th><td>${S.contractDate}</td></tr>
      <tr><th>種別</th><td>${S.type} · ${S.mode==='revise'?'変更':'新規'}</td></tr>
      <tr><th>購買元</th><td><span class="pa-badge">PA${p?.cr49f_id}</span> ${p?.name} ${p?.isLocal?'<span style="color:var(--warn);font-size:11px;">[ローカル]</span>':''}</td></tr>
      <tr><th>住所</th><td style="font-size:12px;">${p?.address||'—'}</td></tr>
      <tr><th>TEL / FAX</th><td style="font-size:12px;">${p?.tel||'—'} / ${p?.fax||'—'}</td></tr>
      <tr><th>担当者</th><td style="font-size:12px;">${p?.person||'—'}</td></tr>
      <tr class="preview-section-row"><td colspan="2">条件</td></tr>
      <tr><th>支払条件</th><td>${S.paymentTerm}</td></tr>
      <tr><th>為替1$</th><td>¥${S.exchangeRate}</td></tr>
      <tr><th>出荷期限</th><td>${S.deadline}</td></tr>
      <tr class="preview-section-row"><td colspan="2">品目明細</td></tr>
      ${S.details.map((d,i) => `<tr><th>${i+1}. ${d.item.code}</th><td>${d.qty.toLocaleString()} KG (${d.count}本)<br><span style="font-size:12px;color:var(--text2);">¥${d.price}/kg · ${d.pol} ${d.incoterms}渡し${d.remark?`<br>📝 ${d.remark}`:''}</span><br><strong style="color:var(--accent2);">¥${d.amount.toLocaleString()}</strong></td></tr>`).join('')}
      <tr><th>税抜き</th><td style="font-size:16px;font-weight:700;">¥${subtotal.toLocaleString()}</td></tr>
      <tr><th>税込み</th><td style="font-size:16px;font-weight:700;color:var(--accent2);">¥${total.toLocaleString()}</td></tr>
    </table>
    <div class="complete-actions">
      <button class="action-btn primary" onclick="doSaveJson()">
        <div class="action-icon">💾</div>
        <div><div class="action-text-main">JSON保存 (処理待ちフォルダ)</div><div class="action-text-sub">夜間CoworkがCOMPASSに自動登録 · 安全モード</div></div>
      </button>
      <button class="action-btn" onclick="doDownload()">
        <div class="action-icon">📥</div>
        <div><div class="action-text-main">JSONダウンロード (ブラウザから)</div><div class="action-text-sub">ファイルをPCに保存して手動配布</div></div>
      </button>
    </div>
    <div class="nav-row" style="margin-top:12px;"><button class="btn-back" onclick="prevStep()">← 修正する</button></div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// 保存処理
// ══════════════════════════════════════════════════════
function buildContractJson() {
  const subtotal = S.details.reduce((s,d) => s+d.amount, 0);
  return {
    meta: {
      version: 'v1.3',
      source: 'LEENAI_CONTRACT_TOOL',
      created_at: new Date().toISOString(),
      created_by: S.userName || 'unknown',
      status: 'pending_compass_registration',
    },
    contract: {
      type: S.type,
      mode: S.mode,
      contract_no: S.contractNo,
      contract_date: S.contractDate,
      revise_no: S.mode === 'revise' ? S.reviseNo : null,
      revise_date: S.mode === 'revise' ? S.reviseDate : null,
      packer: {
        guid: S.packer?.id,
        cr49f_id: S.packer?.cr49f_id,
        code: S.packer?.code,
        ryakugo: S.packer?.ryakugo,
        name: S.packer?.name,
        address: S.packer?.address,
        tel: S.packer?.tel,
        fax: S.packer?.fax,
        person: S.packer?.person,
        is_local: S.packer?.isLocal || false,
      },
      payment_term: S.paymentTerm,
      exchange_rate: S.exchangeRate,
      deadline: S.deadline,
      details: S.details.map(d => ({
        item_code: d.item.code,
        item_name_jp: d.item.nameJp,
        quantity_kg: d.qty,
        container_count: d.count,
        unit_price: d.price,
        pol: d.pol,
        incoterms: d.incoterms,
        remark: d.remark,
        amount: d.amount,
      })),
      subtotal, tax: Math.floor(subtotal*0.10), total: Math.floor(subtotal*1.10),
    }
  };
}

function doSaveJson() {
  const data = buildContractJson();
  // 実運用では SharePoint にPOST。ここではダウンロード
  const filename = `${S.contractDate}_${S.type}_${S.contractNo}_${shortName(S.packer?.name||'')}.json`;
  downloadJson(data, filename);
  alert(`💾 [DEMO]\n\n保存先 (実運用予定):\nSharePoint LEENAI_CONTRACT_DRAFT/処理待ち/\n  ${filename}\n\n夜間CoworkがCOMPASSに自動登録します。\n\n現在はブラウザから JSONをダウンロードしました。`);
  resetWizard();
}

function doDownload() {
  const data = buildContractJson();
  const filename = `${S.contractDate}_${S.type}_${S.contractNo}_${shortName(S.packer?.name||'')}.json`;
  downloadJson(data, filename);
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function resetWizard() {
  const preserved = { accessToken: S.accessToken, tokenExpiry: S.tokenExpiry, userName: S.userName, userEmail: S.userEmail };
  S = initState();
  Object.assign(S, preserved);
  renderStep();
  window.scrollTo(0,0);
}

function nextStep() { S.step++; renderStep(); window.scrollTo(0,0); }
function prevStep() { if(S.step>0){S.step--;renderStep();window.scrollTo(0,0);} }
function safeSet(id, val) { const el=document.getElementById(id); if(el) el.value=val; }

// ══════════════════════════════════════════════════════
// Tabs
// ══════════════════════════════════════════════════════
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['wizard','history','master'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-'+name).style.display = 'block';
}

// 履歴
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!el) return;
  const title = document.getElementById('historyTitle');
  if (!RECENT_CONTRACTS.length) {
    title.textContent = 'データなし (オフラインモード)';
    el.innerHTML = '';
    return;
  }
  title.textContent = `最近の購買契約 (${RECENT_CONTRACTS.length}件)`;
  el.innerHTML = RECENT_CONTRACTS.slice(0, 30).map(c => {
    const p = PACKERS.find(pp => pp.id.toLowerCase() === (c['_cr49f_packer_id_value']||'').toLowerCase());
    const dets = CONTRACT_ITEMS[c.cr49f_purchase_contractid] || [];
    const detSummary = dets.slice(0,3).map(d => `${d.item_code||'?'} ${d.qty||0}MT(${d.count||0}本)`).join(' / ');
    return `<div class="history-item">
      <div style="flex:1;">
        <div class="history-no">${c.cr49f_purchase_contract_no}</div>
        <div class="history-packer">${p ? `<span class="pa-badge">PA${p.cr49f_id}</span>${p.ryakugo?`<span class="ryakugo-badge">${p.ryakugo}</span>`:''}${p.name}` : '(不明)'}</div>
        <div class="history-detail">${(c.cr49f_contract_date||'').split('T')[0]} · ${detSummary || '明細取得中...'}</div>
      </div>
      <span class="history-status status-done">COMPASS登録済み</span>
    </div>`;
  }).join('');
}

// マスター
function renderMaster() {
  document.getElementById('packerCount').textContent = `(${PACKERS.length}社)`;
  filterMasterList();
}

function filterMasterList() {
  const q = (document.getElementById('masterSearch')?.value||'').toLowerCase();
  const el = document.getElementById('masterList');
  if (!el) return;
  const filtered = PACKERS.filter(p => {
    if (!q) return true;
    return (p.name||'').toLowerCase().includes(q) ||
           ('pa'+p.cr49f_id).toLowerCase().includes(q) ||
           (p.code||'').toLowerCase().includes(q) ||
           (p.ryakugo||'').toLowerCase().includes(q);
  });
  el.innerHTML = filtered.map(p => {
    const stats = getPackerStats(p.id);
    return `<div class="master-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:700;">
            <span class="pa-badge">PA${p.cr49f_id}</span>
            <span class="code-badge">${p.code||'—'}</span>
            ${p.ryakugo ? `<span class="ryakugo-badge">${p.ryakugo}</span>` : ''}
            ${p.name}
            ${p.isLocal?'<span style="font-size:10px;color:var(--warn);font-weight:700;margin-left:6px;">[ローカル]</span>':''}
          </div>
          <div style="font-size:11px;color:var(--text2);margin-top:4px;">${p.address||'—'}</div>
          <div style="font-size:11px;color:var(--text2);">${p.tel||''} · ${p.person||''}</div>
        </div>
      </div>
      ${stats.contracts_count ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--accent2);display:flex;gap:10px;flex-wrap:wrap;">
        <span>過去 ${stats.contracts_count}件</span>
        <span>主POL: ${stats.top_pol||'—'} (${stats.top_pol_pct}%)</span>
        <span>主渡し: ${stats.top_inco||'—'}</span>
      </div>` : ''}
    </div>`;
  }).join('') || '<div style="color:var(--text3);text-align:center;padding:20px;">該当なし</div>';
}
